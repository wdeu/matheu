<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Left side: Text -->
  <text x="100" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="8">MATHEU.EU</text>
  
  <text x="100" y="260" font-family="Georgia, serif" font-size="80" font-weight="700" fill="white">MathEU</text>
  
  <text x="100" y="350" font-family="Georgia, serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.95)" font-style="italic">Mental Math for Europe –</text>
  <text x="100" y="405" font-family="Georgia, serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.95)" font-style="italic">in 8 languages, free forever.</text>
  
  <!-- Right side: 2048-style cards -->
  <!-- Card grid 3x3 -->
  <g transform="translate(750, 120)">
    <!-- Row 1 -->
    <g transform="translate(0, 0) rotate(-5 50 50)">
      <rect width="100" height="100" rx="12" fill="#10b981"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="white" text-anchor="middle">2</text>
    </g>
    <g transform="translate(130, 0) rotate(3 50 50)">
      <rect width="100" height="100" rx="12" fill="#14b8a6"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="white" text-anchor="middle">4</text>
    </g>
    <g transform="translate(260, 0) rotate(-2 50 50)">
      <rect width="100" height="100" rx="12" fill="#06b6d4"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="white" text-anchor="middle">8</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(0, 135) rotate(4 50 50)">
      <rect width="100" height="100" rx="12" fill="rgba(255,255,255,0.15)"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">+</text>
    </g>
    <g transform="translate(130, 135)">
      <rect width="100" height="100" rx="12" fill="#059669"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="white" text-anchor="middle">6</text>
    </g>
    <g transform="translate(260, 135) rotate(2 50 50)">
      <rect width="100" height="100" rx="12" fill="rgba(255,255,255,0.15)"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">–</text>
    </g>
    
    <!-- Row 3 -->
    <g transform="translate(0, 270) rotate(-3 50 50)">
      <rect width="100" height="100" rx="12" fill="rgba(255,255,255,0.15)"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">×</text>
    </g>
    <g transform="translate(130, 270) rotate(5 50 50)">
      <rect width="100" height="100" rx="12" fill="rgba(255,255,255,0.15)"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">÷</text>
    </g>
    <g transform="translate(260, 270) rotate(-4 50 50)">
      <rect width="100" height="100" rx="12" fill="#f59e0b"/>
      <text x="50" y="72" font-family="system-ui" font-size="60" font-weight="700" fill="white" text-anchor="middle">9</text>
    </g>
  </g>
  
  <!-- Flag strip at bottom -->
  <g transform="translate(0, 580)">
    <rect x="0" y="0" width="150" height="50" fill="#10b981"/>
    <rect x="150" y="0" width="150" height="50" fill="#f59e0b"/>
    <rect x="300" y="0" width="150" height="50" fill="#ef4444"/>
    <rect x="450" y="0" width="150" height="50" fill="#14b8a6"/>
    <rect x="600" y="0" width="150" height="50" fill="#3b82f6"/>
    <rect x="750" y="0" width="150" height="50" fill="#8b5cf6"/>
    <rect x="900" y="0" width="150" height="50" fill="#ec4899"/>
    <rect x="1050" y="0" width="150" height="50" fill="#06b6d4"/>
  </g>
</svg>
