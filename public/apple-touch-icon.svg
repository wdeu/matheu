<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" fill="#0d9488" rx="40"/>
  
  <!-- Grid pattern subtle -->
  <rect x="15" y="15" width="150" height="150" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  
  <!-- Card 1 (top-left) - Emerald -->
  <g transform="translate(25, 25) rotate(-8 30 30)">
    <rect width="60" height="60" rx="8" fill="#10b981"/>
    <text x="30" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">2</text>
  </g>
  
  <!-- Card 2 (top-right) - Teal -->
  <g transform="translate(95, 20) rotate(5 30 30)">
    <rect width="60" height="60" rx="8" fill="#14b8a6"/>
    <text x="30" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">4</text>
  </g>
  
  <!-- Card 3 (bottom-left) - Cyan -->
  <g transform="translate(20, 95) rotate(3 30 30)">
    <rect width="60" height="60" rx="8" fill="#06b6d4"/>
    <text x="30" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">8</text>
  </g>
  
  <!-- Card 4 (bottom-right) - Amber -->
  <g transform="translate(100, 100) rotate(-5 30 30)">
    <rect width="60" height="60" rx="8" fill="#f59e0b"/>
    <text x="30" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">6</text>
  </g>
</svg>
